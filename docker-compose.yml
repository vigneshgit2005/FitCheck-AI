version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitcheck-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist ChromaDB vector store and uploaded clothing photos across restarts
      - chromadb_data:/app/data/chromadb
      - uploads_data:/app/data/uploads
    ports:
      - "8000:8000"         # expose for direct access / debugging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - fitcheck-net

  # ── React frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitcheck-frontend
    restart: unless-stopped
    ports:
      - "80:80"             # main app served here → http://localhost
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fitcheck-net

# ── Named volumes (data persists between docker-compose up/down) ──────────────
volumes:
  chromadb_data:
    driver: local
  uploads_data:
    driver: local

# ── Internal network (frontend ↔ backend talk by service name) ────────────────
networks:
  fitcheck-net:
    driver: bridge
